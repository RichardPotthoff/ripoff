<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ripoff Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            display: block;
            transform-origin: top left;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* so controls don't block game input */
        }
        button {
            pointer-events: auto; /* only button clickable */
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    <div id="controls">
        <p>Wave: <span id="wave">0</span></p>
        <button id="pauseBtn">Pause</button>
    </div>

<script type="module">
    import {MyScene} from "./ripoff.js";

    const rawCanvas = document.getElementById('gameCanvas');
    const container = document.getElementById('game-container');

    const NATIVE_WIDTH  = rawCanvas.width;
    const NATIVE_HEIGHT = rawCanvas.height;

    let currentScale = 1;
    let invCurrentScale =1;
    function updateScale() {
        const iframe = window.frameElement;
        let w = window.innerWidth;
        if (iframe) w = iframe.clientWidth || iframe.offsetWidth || w;

        currentScale = w / NATIVE_WIDTH;
        invCurrentScale = 1.0/currentScale;
        
        rawCanvas.style.transform = `scale(${currentScale})`;
        rawCanvas.style.transformOrigin = 'top left';

        const scaledHeight = Math.round(NATIVE_HEIGHT * currentScale);

        container.style.height = `${scaledHeight}px`;
        if (iframe) {
            iframe.style.height = `${scaledHeight}px`;
            const parent = iframe.parentElement;
            if (parent) parent.style.height = `${scaledHeight}px`;
        }
    }

    updateScale();
    window.addEventListener('resize', updateScale);
    window.addEventListener('orientationchange', updateScale);
    setTimeout(updateScale, 300);

    // Pass canvas + scale getter
    new MyScene(rawCanvas, () => invCurrentScale);
</script>
</body>
</html>
